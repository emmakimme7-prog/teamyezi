<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Team Yez1</title>
    <meta name="theme-color" content="#191511" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .not-found {
        width: min(calc(100% - 32px), 720px);
        padding: 40px;
        border: 1px solid rgba(25, 21, 17, 0.08);
        border-radius: 32px;
        background: rgba(255, 252, 247, 0.82);
        box-shadow: 0 24px 80px rgba(42, 29, 16, 0.12);
      }

      .not-found p {
        color: #6e655b;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <p class="eyebrow">404</p>
      <h1>찾으시는 페이지가 보이지 않습니다.</h1>
      <p>
        주소가 바뀌었거나 삭제되었을 수 있습니다. Team Yez1 메인 페이지로 돌아가서 작업과
        문의 정보를 다시 확인해 주세요.
      </p>
      <a class="button button-dark" href="./index.html">메인으로 돌아가기</a>
    </main>
  </body>
</html>
