<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TY | Preparing</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f5f1e8;
        --muted: rgba(245, 241, 232, 0.68);
        --accent: #d8b36a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(216, 179, 106, 0.22), transparent 34%),
          linear-gradient(180deg, #111111 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Pretendard", "Inter", system-ui, sans-serif;
      }

      main {
        width: min(100%, 720px);
        padding: 48px 28px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(216, 179, 106, 0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 14px;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 auto;
        max-width: 520px;
        color: var(--muted);
        font-size: clamp(15px, 2vw, 18px);
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">TY</div>
      <h1>준비중입니다</h1>
      <p>더 나은 모습으로 다시 인사드릴 수 있도록 현재 사이트를 정비하고 있습니다. 잠시 후 다시 방문해주세요.</p>
    </main>
  </body>
</html>
